<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NimblScale Strategy Builder — NimblShift Consulting Inc.</title>
<style>

/* ── NIMBLSHIFT BRAND TOKENS ─────────────────────────────────── */
:root{
  --ns-blue:#33A6D6;
  --ns-blue-dark:#1E7FA6;
  --ns-blue-mid:#2890BB;
  --ns-blue-light:#E8F6FC;
  --ns-teal:#009999;
  --ns-teal-light:#E0F5F5;
  --ns-orange:#FF911E;
  --ns-orange-light:#FFF0E0;
  --ns-green:#7DC10D;
  --ns-charcoal:#616666;
  --ns-dark:#333333;
  --ns-near-black:#1A1A2E;
  --ns-mid-grey:#969696;
  --ns-light-grey:#F2F2F2;
  --ns-white:#FFFFFF;
  --ns-border:#D0E8F2;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--ns-light-grey);color:var(--ns-dark);font-size:14px;line-height:1.5}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:252px;min-width:252px;background:var(--ns-near-black);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.main{margin-left:252px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--ns-white);border-bottom:3px solid var(--ns-blue);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.content{padding:28px;flex:1}

/* SIDEBAR */
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo-img{width:148px;display:block;margin-bottom:8px;filter:brightness(0) invert(1)}
.sidebar-product-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.sidebar-product{font-size:13px;font-weight:700;color:var(--ns-blue);letter-spacing:.02em}
.sidebar-sep{color:rgba(255,255,255,.2);font-size:12px}
.sidebar-tagline{font-size:11px;color:rgba(255,255,255,.4)}
.step-group{padding:2px 0}
.step-group-header{padding:9px 14px 7px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.step-group-header:hover{background:rgba(255,255,255,.04)}
.step-group-header.active-step{background:rgba(51,166,214,.1);border-left-color:var(--ns-blue)}
.step-num-badge{background:rgba(51,166,214,.18);color:var(--ns-blue);font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.06em;white-space:nowrap;margin-top:1px;flex-shrink:0}
.step-group-header.active-step .step-num-badge{background:var(--ns-blue);color:white}
.step-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);line-height:1.35}
.step-group-header.active-step .step-title{color:white}
.sub-steps{padding-bottom:2px}
.sub-step{padding:6px 14px 6px 44px;font-size:11px;color:rgba(255,255,255,.42);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:7px;border-left:3px solid transparent}
.sub-step:hover{color:rgba(255,255,255,.78);background:rgba(255,255,255,.04)}
.sub-step.active{color:var(--ns-blue);border-left-color:var(--ns-blue);background:rgba(51,166,214,.07);font-weight:700}
.sub-badge{font-size:9px;font-weight:700;color:rgba(51,166,214,.6);min-width:20px;flex-shrink:0}
.sub-step.active .sub-badge{color:var(--ns-blue)}
.progress-section{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.08);margin-top:auto}
.progress-label{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}
.progress-track{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.progress-fill{height:3px;background:var(--ns-blue);border-radius:2px;transition:width .4s ease}
.progress-pct{font-size:10px;color:rgba(255,255,255,.3);margin-top:5px}
.sidebar-footer{padding:10px 16px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:10px;color:rgba(255,255,255,.2);line-height:1.5}

/* TOPBAR */
.breadcrumb{font-size:12px;color:var(--ns-mid-grey)}
.bc-step{color:var(--ns-blue);font-weight:700}
.bc-phase{color:var(--ns-dark);font-weight:600}
.topbar-right{display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn-primary{background:var(--ns-blue);color:white;border:none;border-radius:var(--radius);padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:background .12s;letter-spacing:.01em}
.btn-primary:hover{background:var(--ns-blue-dark)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--ns-charcoal);border:1.5px solid #C8D8E4;border-radius:var(--radius);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;transition:all .12s}
.btn-outline:hover{border-color:var(--ns-blue);color:var(--ns-blue);background:var(--ns-blue-light)}
.btn-orange{background:var(--ns-orange);color:white;border:none;border-radius:var(--radius);padding:12px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:background .12s;width:100%;text-align:center;display:block;margin-top:14px;letter-spacing:.01em}
.btn-orange:hover{background:#E07A0A}
.btn-orange:disabled{opacity:.5;cursor:not-allowed}

/* PHASE HEADER */
.phase-header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.phase-icon-box{width:46px;height:46px;border-radius:8px;background:var(--ns-blue);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 3px 10px rgba(51,166,214,.35)}
.phase-step-label{font-size:10px;font-weight:700;color:var(--ns-blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.phase-title{font-size:21px;font-weight:700;color:var(--ns-near-black);letter-spacing:-.01em}

/* PANELS */
.panel{background:white;border:1px solid var(--ns-border);border-radius:8px;padding:26px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.panel-sub{font-size:13px;color:var(--ns-charcoal);line-height:1.65;margin-bottom:20px}
.section-label{font-size:10px;font-weight:700;color:var(--ns-blue-mid);letter-spacing:.08em;text-transform:uppercase;margin:22px 0 8px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--ns-border)}
.field-label{font-size:13px;color:var(--ns-dark);margin-bottom:6px;line-height:1.5}

/* INPUTS */
textarea{width:100%;border:1.5px solid #D0E4EE;border-radius:var(--radius);padding:10px 12px;font-family:Arial,sans-serif;font-size:13px;line-height:1.6;color:var(--ns-dark);background:white;resize:vertical;min-height:80px;transition:border-color .12s}
textarea:focus{outline:none;border-color:var(--ns-blue);box-shadow:0 0 0 3px rgba(51,166,214,.1)}
input[type=text]{width:100%;border:1.5px solid #D0E4EE;border-radius:var(--radius);padding:10px 12px;font-family:Arial,sans-serif;font-size:13px;color:var(--ns-dark);background:white;margin-bottom:10px;transition:border-color .12s}
input[type=text]:focus{outline:none;border-color:var(--ns-blue)}
select{border:1.5px solid #D0E4EE;border-radius:var(--radius);padding:7px 11px;font-family:Arial,sans-serif;font-size:13px;color:var(--ns-dark);background:white;cursor:pointer}
select:focus{outline:none;border-color:var(--ns-blue)}
.divider{border:none;border-top:1px solid var(--ns-border);margin:20px 0}

/* NOTE BOX */
.note-box{background:var(--ns-blue-light);border-left:3px solid var(--ns-blue);border-radius:0 var(--radius) var(--radius) 0;padding:11px 15px;font-size:12px;color:#1066A0;line-height:1.6;margin-bottom:16px}
.note-box.orange{background:var(--ns-orange-light);border-left-color:var(--ns-orange);color:#7A4200}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.chip{font-size:12px;padding:5px 14px;border-radius:999px;border:1.5px solid #C4D8E4;background:white;color:var(--ns-charcoal);cursor:pointer;transition:all .12s;font-family:Arial,sans-serif}
.chip:hover{border-color:var(--ns-blue);color:var(--ns-blue-dark)}
.chip.sel{background:var(--ns-blue-light);border-color:var(--ns-blue);color:var(--ns-blue-dark);font-weight:700}

/* SCORE CARDS */
.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.score-card{background:var(--ns-light-grey);border:1px solid var(--ns-border);border-radius:var(--radius);padding:12px}
.score-card label{font-size:11px;color:var(--ns-charcoal);display:block;margin-bottom:6px;line-height:1.3;font-weight:600}
.score-card select{width:100%;font-size:11px;padding:4px 7px}
.wt-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--ns-blue-light);color:var(--ns-blue-dark)}

/* VALUE STREAMS */
.vs-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.vs-card{border:1.5px solid var(--ns-border);border-radius:var(--radius);padding:14px;transition:border-color .12s}
.vs-card:hover{border-color:var(--ns-blue)}
.vs-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px}
.vs-name{font-size:13px;font-weight:700;color:var(--ns-near-black);line-height:1.3}
.mat-badge{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700;white-space:nowrap;flex-shrink:0}
.mat-basic{background:#FCEBEB;color:#A32D2D}
.mat-developing{background:#FFF0E0;color:#8B4A00}
.mat-established{background:var(--ns-blue-light);color:var(--ns-blue-dark)}
.mat-advanced{background:#E0F5F5;color:#006666}
.mat-leading{background:#EEEDFE;color:#3C3489}

/* CAPABILITY TABLE */
.cap-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.cap-table th{text-align:left;padding:9px 10px;font-size:11px;font-weight:700;color:white;background:var(--ns-near-black)}
.cap-table th:first-child{border-radius:var(--radius) 0 0 0}
.cap-table th:last-child{border-radius:0 var(--radius) 0 0}
.cap-table td{padding:8px 10px;border-bottom:1px solid var(--ns-border);color:var(--ns-dark);vertical-align:middle}
.cap-table tr:hover td{background:var(--ns-blue-light)}
.cap-table select{font-size:11px;padding:3px 6px}

/* BBP */
.bbp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.bbp-card{border:1.5px solid var(--ns-border);border-radius:var(--radius);padding:16px;transition:border-color .12s}
.bbp-card:hover{border-color:var(--ns-blue)}
.bbp-title{font-size:13px;font-weight:700;color:var(--ns-near-black);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.bbp-icon{width:28px;height:28px;border-radius:6px;background:var(--ns-blue-light);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.bbp-desc{font-size:11px;color:var(--ns-charcoal);line-height:1.45;margin-bottom:10px}
.bbp-card textarea{min-height:72px;font-size:12px}

/* SWOT */
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.swot-card{border-radius:var(--radius);padding:14px}
.swot-s{border:1.5px solid var(--ns-green);background:#F3FDE0}
.swot-w{border:1.5px solid var(--ns-orange);background:var(--ns-orange-light)}
.swot-o{border:1.5px solid var(--ns-blue);background:var(--ns-blue-light)}
.swot-t{border:1.5px solid #C0392B;background:#FEF0F0}
.swot-head{font-size:12px;font-weight:700;margin-bottom:6px}
.swot-s .swot-head{color:#3D6A00}
.swot-w .swot-head{color:#8B4A00}
.swot-o .swot-head{color:var(--ns-blue-dark)}
.swot-t .swot-head{color:#A32D2D}
.swot-card textarea{background:transparent;border:none;border-bottom:1px solid rgba(0,0,0,.1);border-radius:0;padding:4px 0;min-height:80px;font-size:12px;box-shadow:none}
.swot-card textarea:focus{border-bottom-color:var(--ns-blue);box-shadow:none}

/* PILLAR GRID */
.pillar-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.pillar-card{border:1.5px solid var(--ns-border);border-radius:var(--radius);padding:14px}
.pillar-head{font-size:12px;font-weight:700;color:var(--ns-blue-dark);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.pillar-head-dot{width:7px;height:7px;border-radius:50%;background:var(--ns-blue);flex-shrink:0}
.pillar-desc{font-size:11px;color:var(--ns-charcoal);margin-bottom:8px;line-height:1.4}
.pillar-card textarea{min-height:64px;font-size:12px}

/* SSC */
.ssc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.ssc-col{border:1.5px solid var(--ns-border);border-radius:var(--radius);padding:14px}
.ssc-head{font-size:11px;font-weight:700;padding:4px 12px;border-radius:3px;margin-bottom:10px;display:inline-block;color:white}
.ssc-start{background:var(--ns-blue)}
.ssc-stop{background:var(--ns-orange)}
.ssc-cont{background:var(--ns-teal)}
.ssc-col textarea{min-height:120px;font-size:12px}

/* ROADMAP TABLE */
.rdm-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.rdm-table th{padding:10px;text-align:left;font-size:11px;font-weight:700;background:var(--ns-near-black);color:white;border-right:1px solid rgba(255,255,255,.08)}
.rdm-table th:first-child{background:var(--ns-blue);border-radius:var(--radius) 0 0 0}
.rdm-table th:last-child{border-radius:0 var(--radius) 0 0;border-right:none}
.rdm-table td{padding:6px;border-bottom:1px solid var(--ns-border);vertical-align:top}
.rdm-table td:first-child{padding:10px;font-weight:700;font-size:11px;color:var(--ns-near-black);white-space:nowrap;vertical-align:middle}
.rdm-table textarea{border:1px solid var(--ns-border);border-radius:4px;font-size:11px;min-height:60px;width:100%}
.stream-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:3px}
.s0{background:var(--ns-blue-light);color:var(--ns-blue-dark)}
.s1{background:var(--ns-teal-light);color:#006666}
.s2{background:#EEEDFE;color:#3C3489}
.s3{background:var(--ns-orange-light);color:#8B4A00}
.s4{background:var(--ns-light-grey);color:var(--ns-charcoal)}

/* RISK TABLE */
.risk-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.risk-table th{text-align:left;padding:9px 10px;font-size:11px;font-weight:700;color:white;background:var(--ns-near-black)}
.risk-table th:first-child{border-radius:var(--radius) 0 0 0}
.risk-table th:last-child{border-radius:0 var(--radius) 0 0}
.risk-table td{padding:9px 10px;border-bottom:1px solid var(--ns-border);font-size:12px;vertical-align:middle}
.risk-table tr:hover td{background:var(--ns-light-grey)}
.r-high{background:#FCEBEB;color:#A32D2D;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700}
.r-med{background:var(--ns-orange-light);color:#8B4A00;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700}
.r-low{background:var(--ns-blue-light);color:var(--ns-blue-dark);font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700}

/* INIT TABLE */
.init-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.init-table th{text-align:left;padding:9px 10px;font-size:11px;font-weight:700;color:white;background:var(--ns-blue)}
.init-table th:first-child{border-radius:var(--radius) 0 0 0}
.init-table th:last-child{border-radius:0 var(--radius) 0 0}
.init-table td{padding:8px 10px;border-bottom:1px solid var(--ns-border);vertical-align:middle}
.init-table tr:hover td{background:var(--ns-blue-light)}
.init-table input{border:none;background:transparent;font-size:12px;color:var(--ns-dark);width:100%;padding:0;font-family:Arial,sans-serif}
.init-table select{font-size:11px;padding:3px 6px;border:1px solid var(--ns-border);border-radius:3px}

/* KPI TABLE */
.kpi-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
.kpi-table th{text-align:left;padding:9px 10px;font-size:11px;font-weight:700;color:white;background:var(--ns-teal)}
.kpi-table th:first-child{border-radius:var(--radius) 0 0 0}
.kpi-table th:last-child{border-radius:0 var(--radius) 0 0}
.kpi-table td{padding:8px 10px;border-bottom:1px solid var(--ns-border)}
.kpi-table tr:hover td{background:var(--ns-teal-light)}
.lead-tag{font-size:10px;padding:2px 8px;border-radius:3px;background:var(--ns-blue-light);color:var(--ns-blue-dark);font-weight:700}
.lag-tag{font-size:10px;padding:2px 8px;border-radius:3px;background:var(--ns-teal-light);color:#006666;font-weight:700}

/* AI SECTION */
.ai-section{margin-top:22px;padding-top:20px;border-top:1px solid var(--ns-border)}
.ai-label{font-size:9px;font-weight:700;color:var(--ns-blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.ai-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ai-status{font-size:12px;color:var(--ns-mid-grey);font-style:italic}
.ai-output{background:var(--ns-light-grey);border-left:3px solid var(--ns-blue);border-radius:0 var(--radius) var(--radius) 0;padding:16px 18px;font-size:13px;line-height:1.8;color:var(--ns-dark);white-space:pre-wrap;margin-top:14px}

/* FINAL DOC */
.final-doc{background:white;border:1.5px solid var(--ns-blue);border-radius:var(--radius);padding:22px;font-size:13px;line-height:1.85;color:var(--ns-dark);white-space:pre-wrap;max-height:600px;overflow-y:auto;margin-top:16px;box-shadow:0 2px 14px rgba(51,166,214,.14)}

/* SUMMARY CARDS */
.summ-card{background:var(--ns-light-grey);border:1px solid var(--ns-border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.summ-head{font-size:12px;font-weight:700;color:var(--ns-near-black);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.summ-accent{width:4px;height:14px;border-radius:2px;background:var(--ns-blue);flex-shrink:0}

/* NAV CONTROLS */
.nav-controls{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px}
.nav-phase-info{font-size:11px;color:var(--ns-mid-grey)}

@media(max-width:768px){
  .sidebar{display:none}.main{margin-left:0}
  .vs-grid,.swot-grid,.pillar-grid,.bbp-grid,.ssc-grid{grid-template-columns:1fr}
  .score-grid{grid-template-columns:1fr 1fr}
}

</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->

const NAV = [
  { step:1, icon:'📊', title:'Current State Assessment', phases:[
    { id:'1A', label:'Company Snapshot' },
    { id:'1B', label:'Founder Vision' },
    { id:'1C', label:'Critical Processes' },
    { id:'1D', label:'Digital & AI Readiness' },

  { step:2, icon:'🗺️', title:'Where to Play', phases:[
    { id:'2A', label:'Strategic Challenge' },
    { id:'2B', label:'Growth Ambition' },
    { id:'2C', label:'Target Markets' },
    { id:'2D', label:'Business Model' },
    { id:'2E', label:'Strategic Priorities' }
  ]},
  { step:3, icon:'⚙️', title:'Target Operating Model', phases:[
    { id:'3A', label:'Value Streams' },
    { id:'3B', label:'Capability Assessment' },
    { id:'3C', label:'Buy, Build or Partner' },
    { id:'3D', label:'Management Systems' },
    { id:'3E', label:'Start, Stop, Continue' }
  ]},
  { step:4, icon:'🤝', title:'People & Culture Strategy', phases:[
    { id:'4A', label:'Vision & Values' },
    { id:'4B', label:'Workforce SWOT' },
    { id:'4C', label:'Workforce & Partners' },
    { id:'4D', label:'EVP & Engagement' },

  ]},
  { step:5, icon:'📋', title:'Final Strategic Plan', phases:[
    { id:'5A', label:'Plan Summary' },
    { id:'5B', label:'Initiatives Tracker' },
    { id:'5C', label:'Implementation Roadmap' },
    { id:'5D', label:'Risk & Governance' },
    { id:'5E', label:'Generate Document' }
  ]}
];

let curStep = 0, curPhase = 0;
const totalPhases = NAV.reduce((a,s)=>a+s.phases.length,0);

function flatIndex(si,pi){ let idx=0; for(let i=0;i<si;i++) idx+=NAV[i].phases.length; return idx+pi; }
function fromFlat(idx){ let s=0; while(s<NAV.length && idx>=NAV[s].phases.length){idx-=NAV[s].phases.length;s++;} return {s,p:idx}; }

function buildNav(){
  const nav = document.getElementById('nav-steps');
  nav.innerHTML = NAV.map((step,si)=>`
    <div class="step-group">
      <div class="step-group-header ${si===curStep?'active-step':''}" onclick="goTo(${si},0)">
        <span class="step-num">Step ${step.step}</span>
        <span class="step-title">${step.title}</span>
      </div>
      <div class="sub-steps">
        ${step.phases.map((ph,pi)=>`
          <div class="sub-step ${si===curStep&&pi===curPhase?'active':''}" onclick="goTo(${si},${pi})">
            <span class="sub-badge">${ph.id}</span>${ph.label}
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function updateProgress(){
  const fi = flatIndex(curStep,curPhase)+1;
  const pct = Math.round((fi/totalPhases)*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = `Step ${curStep+1} of 5 · Phase ${NAV[curStep].phases[curPhase].id}`;
  const ph = NAV[curStep].phases[curPhase];
  document.getElementById('breadcrumb').innerHTML = `<span>Step ${curStep+1}</span> · ${NAV[curStep].title} · <span>${ph.id} — ${ph.label}</span>`;
}

function goTo(si,pi){
  curStep=si; curPhase=pi;
  buildNav(); updateProgress(); renderPanel();
  window.scrollTo(0,0);
}

function nextPhase(){
  const fi = flatIndex(curStep,curPhase);
  if(fi<totalPhases-1){ const n=fromFlat(fi+1); goTo(n.s,n.p); }
}
function prevPhase(){
  const fi = flatIndex(curStep,curPhase);
  if(fi>0){ const n=fromFlat(fi-1); goTo(n.s,n.p); }
}

function tc(el){ el.classList.toggle('sel'); }

function ta(id,ph='',rows=4){ return `<textarea id="${id}" placeholder="${ph}" rows="${rows}"></textarea>`; }
function inp(id,ph=''){ return `<input type="text" id="${id}" placeholder="${ph}" style="margin-bottom:10px">`; }
function sel(id,opts){ return `<select id="${id}">${opts.map(o=>`<option>${o}</option>`).join('')}</select><br><br>`; }
function sl(t){ return `<div class="section-label">${t}</div>`; }
function fl(t){ return `<div class="field-label">${t}</div>`; }
function note(t){ return `<div class="note-box">${t}</div>`; }
function divider(){ return `<hr class="divider">`; }
function scoreCard(label,wt,id){ return `<div class="score-card"><label>${label} ${wt?`<span class="wt-tag">${wt}</span>`:''}</label><select id="${id}"><option>5 — Critical</option><option>4 — High</option><option selected>3 — Medium</option><option>2 — Low</option><option>1 — Minimal</option></select></div>`; }
function matSel(id,def='Developing'){ const opts=['Basic','Developing','Established','Advanced','Leading']; return `<select id="${id}" onchange="updateBadge('${id}',this.value)">${opts.map(o=>`<option${o===def?' selected':''}>${o}</option>`).join('')}</select>`; }
function vsCard(name,desc,id,def){ return `<div class="vs-card"><div class="vs-head"><div class="vs-name">${name}</div><span class="mat-badge mat-${def.toLowerCase()}" id="${id}-badge">${def}</span></div><div style="font-size:11px;color:#6B7280;margin-bottom:8px">${desc}</div>${matSel(id,def)}</div>`; }
function updateBadge(id,v){ const b=document.getElementById(id+'-badge'); if(!b)return; b.className='mat-badge mat-'+v.toLowerCase(); b.textContent=v; }
function bbpCard(icon,title,desc,id,lbl,ph){ return `<div class="bbp-card"><div class="bbp-title"><span class="bbp-title-icon">${icon}</span>${title}</div><div class="bbp-desc">${desc}</div><div class="field-label" style="font-size:12px">${lbl}</div>${ta(id,ph,3)}</div>`; }
function swotCard(cls,head,desc,id){ return `<div class="swot-card ${cls}"><div class="swot-head">${head}</div><div style="font-size:11px;margin-bottom:6px;line-height:1.4">${desc}</div>${ta(id,'')}</div>`; }
function sscCol(title,cls,id,ph){ return `<div class="ssc-col"><div class="ssc-head ${cls}">${title}</div>${ta(id,ph,5)}</div>`; }
function rdmRow(label,cls,pfx){ return `<tr><td><span class="stream-badge ${cls}">${label}</span></td><td>${ta(pfx+'y1','Year 1 priorities…',3)}</td><td>${ta(pfx+'y2','Year 2 priorities…',3)}</td><td>${ta(pfx+'y3','Year 3 priorities…',3)}</td></tr>`; }
function initRow(n,name,lead,hor,date,measure){ return `<tr><td style="color:#9CA3AF;font-size:11px">${n}</td><td><input type="text" value="${name}" style="font-size:12px;width:100%;border:none;background:transparent;color:#1A2B4A"></td><td><input type="text" value="${lead}" placeholder="Owner" style="font-size:12px;width:90px;border:none;background:transparent;color:#1A2B4A"></td><td><select style="font-size:11px;padding:3px 6px;border:1px solid #E2E8F0;border-radius:4px"><option${hor==='Immediate'?' selected':''}>Immediate</option><option${hor==='Near-term'?' selected':''}>Near-term</option><option${hor==='Long-term'?' selected':''}>Long-term</option></select></td><td><input type="text" value="${date}" style="font-size:11px;width:70px;border:none;background:transparent;color:#1A2B4A"></td><td style="font-size:11px;color:#4A5568">${measure}</td></tr>`; }

function aiBlock(key){ return `<div class="ai-section"><div class="ai-actions"><button class="btn-primary" id="b${key}" onclick="runAI('${key}')">✦ Analyse with NimblScale AI</button><button class="btn-outline" onclick="runAI('${key}')">↺ Re-analyse</button><span class="ai-status" id="s${key}"></span></div><div class="ai-output" id="o${key}" style="display:none"></div></div>`; }

// ── AI CALL ───────────────────────────────────────────────────────────────────
async function runAI(key){
  const btn=document.getElementById('b'+key), st=document.getElementById('s'+key), out=document.getElementById('o'+key);
  if(!btn)return;
  btn.disabled=true; if(st)st.textContent='NimblScale AI is analysing…'; if(out)out.style.display='none';
  const inputs = [...document.querySelectorAll('textarea,input[type=text]')]
    .filter(e=>e.value&&e.value.trim()).map(e=>e.id+': '+e.value.trim()).join('\n');
  const selChips = [...document.querySelectorAll('.chip.sel')].map(c=>c.textContent.trim()).join(', ');
  const prompt = `NimblScale Strategy Builder — Phase ${key}.\n\nInputs:\n${inputs}\nSelected: ${selChips}\n\nProduce a structured consultant-grade NimblScale analysis for this phase. Use SECTION HEADERS IN ALL CAPS followed by a colon. No markdown. Direct, specific, and actionable. Maximum 380 words.`;
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'You are a senior NimblShift strategy consultant using the NimblScale system (Play to Win + Capability-Driven Strategy frameworks). Produce concise, structured, consultant-grade output. Use SECTION HEADERS IN ALL CAPS followed by a colon. No markdown. Direct and specific.',messages:[{role:'user',content:prompt}]})});
    const d = await r.json();
    if(d.error){if(out){out.textContent='Error: '+d.error.message;out.style.display='block';}return;}
    const txt=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    if(out){out.textContent=txt;out.style.display='block';} if(st)st.textContent='Analysis complete';
  }catch(e){if(out){out.textContent='Error: '+e.message;out.style.display='block';} if(st)st.textContent='Failed';}
  finally{if(btn)btn.disabled=false;}
}

function renderPanel(){
  const s=curStep, p=curPhase;
  const ph = NAV[s].phases[p];
  let html = `<div class="phase-header"><div class="phase-icon">${NAV[s].icon}</div><div class="phase-meta"><div class="phase-step-label">Step ${s+1} · Phase ${ph.id}</div><div class="phase-title">${ph.label}</div></div></div>`;

  if(s===0){

      <div id="file-list" style="font-size:12px;color:#1D9E75"></div>

      ${sl('People and culture')}${fl('How do you envision the role of People and Culture in supporting your strategic objectives? Give examples of current initiatives that align with this vision.')}${ta('v1b','e.g. We believe our people are the foundation of our client experience. Currently, we invest in bi-annual team retreats and have a culture of open-door leadership…')}
      ${aiBlock('1b')}</div>`;

    if(p===2) html+=`<div class="panel"><div class="panel-sub">Identify the processes that are truly mission-critical — the ones that, if they failed, would threaten your ability to deliver for clients or grow the business.</div>
      ${sl('Critical business processes')}${fl('What are the critical business processes key to achieving your strategic goals? List the top processes and explain why each is critical.')}${ta('p1a','e.g. 1. Client onboarding — because a poor first experience undermines retention. 2. Financial reporting — because investors require monthly accuracy. 3. Service delivery workflow — because consistency drives referrals…')}
      ${sl('Data-driven decisions')}${fl('In what ways do you see data (customer, financial, employee) driving strategic decisions? Provide examples of how data has influenced or could influence major decisions.')}${ta('p1b','e.g. Our client retention data shows that clients who attend at least 3 advisory sessions per year have 92% renewal rates vs 67% for those with fewer. This has shaped how we structure our service model…')}
      ${aiBlock('1c')}</div>`;

    if(p===3) html+=`<div class="panel"><div class="panel-sub">Assess where your business stands on digital maturity and AI readiness — honest self-assessment here will sharpen your operating model and capability priorities.</div>
      ${sl('AI and technology foresight')}${fl('What impact do you foresee AI and emerging technologies having on your growth and efficiency? Are there specific digital or technology investments essential for strategic success?')}${ta('d1a','e.g. AI will transform our client reporting and portfolio analysis — what currently takes 4 hours per client monthly could be reduced to 20 minutes. We need to invest in a portfolio analytics platform and CRM integration…')}
      ${sl('Digital readiness self-assessment — rate your current maturity')}
      <div class="four-col">
        ${scoreCard('Client acquisition technology','','dr1')}
        ${scoreCard('Data and analytics capability','','dr2')}
        ${scoreCard('Operations automation','','dr3')}
        ${scoreCard('Digital client experience','','dr4')}
      </div>
      ${sl('Biggest digital or technology gap')}${fl('What is the single most important technology investment your business needs to make in the next 12 months?')}${ta('d1b','e.g. A CRM that integrates with our portfolio management platform — currently we manage client relationships across 3 disconnected systems which creates errors and slows our team down…')}
      ${aiBlock('1d')}</div>`;

    if(p===4) html+=`<div class="panel"><div class="panel-sub">Define your competitive position before building your strategy. Knowing where competitors are strong and where they are vulnerable is essential for choosing where and how to win.</div>

      ${sl('Competitive vulnerabilities')}${fl('Where are you most vulnerable to competitive pressure today?')}${ta('c1c','e.g. Our marketing and digital presence is significantly underdeveloped vs competitors. We have no scalable client acquisition model — almost entirely dependent on referrals…')}
      ${aiBlock('1e')}</div>`;
  }

  // STEP 2
  if(s===1){
    if(p===0) html+=`<div class="panel"><div class="panel-sub">Before choosing a strategic direction, you must clearly articulate the strategic problem your business must solve. Leaders who cannot name their strategic challenge cannot solve it.</div>
      ${note('A strategic challenge is not a task or a goal — it is the fundamental tension or gap between where you are and where you need to be to win.')}
      ${sl('Core strategic problem')}${fl('What is the core strategic problem your business must solve to grow, scale, or remain competitive?')}${ta('sc1','e.g. We need to grow revenue by 3x in 4 years but our current client acquisition model is too slow, too founder-dependent, and too expensive to scale at the pace required…')}

      ${sl('Evaluation criteria — rate importance of each (1–5)')}
      <div class="three-col">
        ${scoreCard('Strategic alignment','25%','cr1')}
        ${scoreCard('Scalability','25%','cr2')}
        ${scoreCard('Revenue & profitability','20%','cr3')}
        ${scoreCard('Differentiation','15%','cr4')}
        ${scoreCard('Talent & capability fit','10%','cr5')}
        ${scoreCard('Risk level','5%','cr6')}

      ${aiBlock('2a')}</div>`;

    if(p===1) html+=`<div class="panel"><div class="panel-sub">Define the long-term vision and growth priorities that will shape every subsequent decision. Clarity here prevents spreading effort too thin and ensures leadership alignment.</div>

    if(p===2) html+=`<div class="panel"><div class="panel-sub">Identify the specific segments, client personas, and geographies where your business can sustain a leading competitive position. Winning requires deliberate choices about where you will — and will not — focus.</div>

      ${sl('Ideal client profile')}${fl('Describe your ideal client in detail — demographics, psychographics, financial behaviours, pain points, needs, and motivations.')}${ta('tm1','e.g. Aged 45–65, successful business owner or senior executive, family-focused with 2–3 dependents, liquid assets $500K–$5M, risk-aware but growth-oriented, values trusted advisor relationships over transactional interactions, frustrated by generic bank advice…')}

      ${aiBlock('2c')}</div>`;

    if(p===3) html+=`<div class="panel"><div class="panel-sub">Define how your business creates, delivers, and captures value — and identify where the highest-leverage scalable growth opportunities lie.</div>

  // STEP 3

      ${sl('Top 3–5 SMART strategic goals')}${fl('Specific, measurable goals this strategy is designed to achieve — with a target and timeframe for each.')}${ta('goals','e.g. 1. Grow AUM from $360M to $500M by Dec 2025. 2. Sign 5 active FSP/broker partnerships by Q2 2025. 3. Reduce founder delivery % from 90% to 60% by Q4 2025. 4. Achieve NPS of 70+ by end of Year 1…')}
      ${aiBlock('5a')}</div>`;

    if(p===1) html+=`<div class="panel"><div class="panel-sub">Define and prioritize the 3–7 strategic initiatives that will drive your plan. Each initiative needs an owner, timeline, and clear success measure.</div>
      <table class="init-table"><thead><tr><th>#</th><th>Initiative name</th><th>Owner</th><th>Horizon</th><th>Target date</th><th>Success measure</th></tr></thead><tbody id="init-body">
        ${initRow(1,'Unique Value Proposition','Owner','Immediate','Q2 Y1','UVP defined and tested with 3 target clients')}
        ${initRow(2,'Strategic partnerships and alliances','','Immediate','Q2 Y1','5 active FSP/broker partnerships signed')}
        ${initRow(3,'Business development and marketing','','Near-term','Q3 Y1','Go-to-market plan live, lead pipeline established')}
        ${initRow(4,'Client referral program','','Near-term','Q3 Y1','Referral program launched, 10 referrals in Q1')}
        ${initRow(5,'Operating model and management systems','','Immediate','Q1 Y1','CRM live, processes documented, weekly cadence established')}
        ${initRow(6,'Senior hire — client associate','','Immediate','Q1 Y1','Senior associate onboarded and managing first 5 relationships')}
      </tbody></table>
      <button class="btn-outline" onclick="addInitRow()" style="margin-bottom:16px">+ Add initiative</button>
      ${sl('90-day sprint priorities')}${fl('What are the 3–5 most critical actions that must happen in the first 90 days to gain immediate traction?')}${ta('sprint','e.g. 1. Town Hall to launch strategy to full team. 2. Implement CRM system and migrate client data. 3. Post the senior associate role. 4. Schedule first 3 FSP/broker conversations. 5. Establish weekly strategy meeting cadence…')}
      ${aiBlock('5b')}</div>`;

    if(p===2) html+=`<div class="panel"><div class="panel-sub">Build the phased implementation roadmap across five streams. This becomes the master execution timeline in the final strategy document.</div>
      ${note('Enter key milestones for each stream across three years. Year 1 = Foundation. Year 2 = Scale. Year 3 = Optimize. Be specific — vague roadmaps fail at execution.')}
      <table class="rdm-table"><thead><tr><th style="width:18%">Stream</th><th style="width:27%">Year 1 — Foundation<br><span style="font-weight:400;color:#9CA3AF;font-size:10px">Months 1–12</span></th><th style="width:27%">Year 2 — Scale<br><span style="font-weight:400;color:#9CA3AF;font-size:10px">Months 13–24</span></th><th style="width:28%">Year 3 — Optimize<br><span style="font-weight:400;color:#9CA3AF;font-size:10px">Months 25–36</span></th></tr></thead><tbody>
        ${rdmRow('Strategy launch','s0','r0')}
        ${rdmRow('Sales and marketing','s1','r1')}
        ${rdmRow('Operating model','s2','r2')}
        ${rdmRow('People and culture','s3','r3')}
        ${rdmRow('Financial and governance','s4','r4')}
      </tbody></table>
      ${aiBlock('5c')}</div>`;

    if(p===3) html+=`<div class="panel"><div class="panel-sub">Every strategy carries risk. Identify the key risks, rate them, define mitigations, and establish the governance structure that will keep the strategy on track.</div>
      ${sl('Enterprise risk register')}
      <table class="risk-table"><thead><tr><th style="width:25%">Risk</th><th style="width:14%">Category</th><th style="width:10%">Priority</th><th>Mitigation</th></tr></thead><tbody>
        ${riskRow('Failure to achieve growth targets','Strategic','High','Strengthen lead generation, accelerate partnership program, monthly pipeline reviews with course-correction triggers')}
        ${riskRow('Founder dependency — single point of failure','Operational','High','Prioritize senior hire, document all processes, transition 2 key client relationships by end of Year 1')}
        ${riskRow('Partnership misalignment or attrition','Operational','Medium','Quarterly partner reviews, clear SLAs, diversify across 5+ partners to avoid single-partner dependency')}
        ${riskRow('Market competition intensifying','Strategic','Medium','Deepen UVP differentiation, accelerate capability build, strengthen client relationships as defensive moat')}
        ${riskRow('Cybersecurity or data breach','Operational','Medium','Implement cybersecurity protocols, regular audits, staff training, cyber insurance')}
        ${riskRow('Key person departure (founder or senior associate)','People','High','Document all processes, cross-train, succession plan, retention strategies and EVP investment')}
      </tbody></table>
      ${sl('Governance structure')}${fl('Who are the key leaders or decision-makers responsible for executing this strategy? Define their accountability.')}${ta('gov1','e.g. CEO/Founder: sets strategic direction, owns business development and top 10 client relationships. Senior Associate: owns delivery for client relationships 11–30, reports directly to CEO. Fractional COO: owns operating model, systems, and delivery efficiency. All meet weekly…')}
      ${sl('Meeting and review cadence')}${chips(['Weekly strategy meeting (60 min)','Monthly leadership review (2 hrs)','Quarterly strategy offsite (1–2 days)','Annual planning retreat (2 days)','90-day OKR sprint cycles','RAPID decision-making model'])}
      ${sl('Continuous improvement process')}${fl('How will you measure, review, and adapt the strategy over time?')}${ta('gov2','e.g. Monthly KPI dashboard review at leadership meeting. Quarterly offsite to assess OKR progress and adjust priorities. Annual strategy refresh (1-day retreat). Lessons learned captured after each major initiative. Client and partner feedback integrated into quarterly planning…')}
      ${aiBlock('5d')}</div>`;

    if(p===4) html+=`<div class="panel"><div class="panel-sub">You have completed all five steps of the NimblScale System. Generate your complete, consultant-grade Business Strategy document — ready to share with your leadership team, board, or advisors.</div>
      ${note('The document follows the full NimblScale structure: Executive Summary → Winning Aspiration → Vision/Mission/Values → Current State → Strategic Goals → Where to Play → How to Win → Operating Model → People & Culture → Initiatives → Roadmap → Risk → Governance → 90-Day Action Plan.')}
      ${sl('Document tone and audience')}${chips(['Executive / board-ready','Leadership team / internal working document','Investor / pitch-ready','Concise plan-on-a-page summary'])}
      ${sl('Additional context for document generation')}${ta('addl','e.g. Emphasize the urgency of the B2B channel shift. Highlight the founder\'s 15-year track record. Note that this is a confidential working draft for leadership review only…',3)}
      <button class="btn-primary" id="b5e" onclick="generateFinalPlan()" style="width:100%;justify-content:center;padding:12px;font-size:14px;margin-top:16px">✦ Generate complete NimblScale Strategic Plan</button>
      <div class="ai-status" id="s5e" style="text-align:center;margin-top:8px;display:block"></div>
      <div id="o5e" class="final-doc" style="display:none"></div>
      <div id="doc-actions" style="display:none;margin-top:12px;display:none">
        <button class="btn-primary" onclick="copyDoc()">📋 Copy full document</button>
        <button class="btn-outline" onclick="generateFinalPlan()">↺ Re-generate</button>
      </div></div>`;
  }

  // NAV CONTROLS
  html += `<div class="nav-controls">
    <button class="btn-outline" onclick="prevPhase()">← Previous</button>
    <span style="font-size:12px;color:#9CA3AF">${NAV[s].phases[p].id} of ${NAV[s].phases.length} in Step ${s+1}</span>
    <button class="btn-primary" onclick="nextPhase()">Next →</button>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function showFiles(input){
  const list = document.getElementById('file-list');
  if(list) list.innerHTML = Array.from(input.files).map(f=>`✓ ${f.name} (${(f.size/1024).toFixed(0)} KB)`).join('<br>');
}

function addInitRow(){
  const tbody = document.getElementById('init-body');
  if(!tbody)return;
  const n = tbody.querySelectorAll('tr').length+1;
  const tr = document.createElement('tr');
  tr.innerHTML = `<td style="color:#9CA3AF;font-size:11px">${n}</td><td><input type="text" placeholder="Initiative name" style="font-size:12px;width:100%;border:none;background:transparent;color:#1A2B4A"></td><td><input type="text" placeholder="Owner" style="font-size:12px;width:90px;border:none;background:transparent;color:#1A2B4A"></td><td><select style="font-size:11px;padding:3px 6px;border:1px solid #E2E8F0;border-radius:4px"><option>Immediate</option><option>Near-term</option><option>Long-term</option></select></td><td><input type="text" placeholder="Q? Y?" style="font-size:11px;width:70px;border:none;background:transparent;color:#1A2B4A"></td><td><input type="text" placeholder="Success measure" style="font-size:11px;width:100%;border:none;background:transparent;color:#1A2B4A"></td>`;
  tbody.appendChild(tr);
}

function copyDoc(){
  const t = document.getElementById('o5e');
  if(t&&t.textContent) navigator.clipboard.writeText(t.textContent).then(()=>alert('Strategy document copied to clipboard.')).catch(()=>alert('Please select and copy the text manually.'));
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildNav();
updateProgress();
renderPanel();

</script>
</body>
</html>
